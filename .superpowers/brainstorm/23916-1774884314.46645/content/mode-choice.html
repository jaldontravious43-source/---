<h2>先定玩法节奏</h2>
<p class="subtitle">你就是邪恶小女孩，下面三种模式选一个作为第一版（MVP）</p>

<div class="cards">
  <div class="card" data-choice="classic" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">经典闯关</div>
        <div class="mockup-body">
          <p>60秒一关</p>
          <p>达标分数后进下一关</p>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 经典闯关（推荐）</h3>
      <p>最接近黄金矿工，开发快，最好先做出来能玩。</p>
    </div>
  </div>

  <div class="card" data-choice="survival" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">生存高分</div>
        <div class="mockup-body">
          <p>不限关卡</p>
          <p>不断提速，直到失败</p>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 生存高分</h3>
      <p>更刺激，但难度曲线和调参工作更多。</p>
    </div>
  </div>

  <div class="card" data-choice="story" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">剧情收集</div>
        <div class="mockup-body">
          <p>目标是抓特定角色组合</p>
          <p>触发特殊台词结局</p>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 剧情收集</h3>
      <p>个性最强，但实现复杂度最高。</p>
    </div>
  </div>
</div>
